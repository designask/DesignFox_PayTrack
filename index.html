<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignFox PayTrack - POS System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <i class="fas fa-bolt"></i>
                    <h1>DesignFox PayTrack</h1>
                    <p>Service Business POS System</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" value="admin@designfox.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" value="admin123" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                </form>
                <div class="login-hint">
                    <p><strong>Demo:</strong> admin@designfox.com / admin123</p>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="app-layout" style="display:none;">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-bolt"></i>
                    <span>PayTrack</span>
                    <button class="sidebar-close" id="sidebar-close"><i class="fas fa-times"></i></button>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" data-page="dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
                    <a href="#" class="nav-item" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
                    <a href="#" class="nav-item" data-page="quotations"><i class="fas fa-file-alt"></i><span>Quotations</span></a>
                    <a href="#" class="nav-item" data-page="invoices"><i class="fas fa-file-invoice-dollar"></i><span>Invoices</span></a>
                    <a href="#" class="nav-item" data-page="payments"><i class="fas fa-credit-card"></i><span>Payments</span></a>
                    <a href="#" class="nav-item" data-page="projects"><i class="fas fa-folder-open"></i><span>Projects</span></a>
                    <a href="#" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="user-avatar">A</div>
                        <div>
                            <p class="user-name">Admin</p>
                            <p class="user-role">Administrator</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <header class="topbar">
                    <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h2 id="page-title">Dashboard</h2>
                    <div class="topbar-right">
                        <span id="current-date"></span>
                    </div>
                </header>
                <div class="content" id="content">
                    <!-- Dynamic content loads here -->
                </div>
            </main>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
